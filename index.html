<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab Monitoring System — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a1628;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
            position: relative;
        }

        /* ── Dark gradient base ── */
        .bg-grad {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 0%,   rgba(0,80,160,0.45) 0%, transparent 60%),
                radial-gradient(ellipse 60% 70% at 85% 100%, rgba(0,50,120,0.40) 0%, transparent 55%),
                #060f1e;
        }

        /* ── Bubbles ── */
        .bubbles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            bottom: -150px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(100,180,255,0.18), rgba(60,120,220,0.06));
            border: 1px solid rgba(100,180,255,0.22);
            animation: rise linear infinite;
        }

        .bubble:nth-child(1)  { width: 40px;  height: 40px;  left: 5%;   animation-duration: 9s;   animation-delay: 0s;   }
        .bubble:nth-child(2)  { width: 20px;  height: 20px;  left: 12%;  animation-duration: 7s;   animation-delay: 1.5s; }
        .bubble:nth-child(3)  { width: 60px;  height: 60px;  left: 20%;  animation-duration: 11s;  animation-delay: 0.5s; }
        .bubble:nth-child(4)  { width: 30px;  height: 30px;  left: 30%;  animation-duration: 8s;   animation-delay: 3s;   }
        .bubble:nth-child(5)  { width: 80px;  height: 80px;  left: 40%;  animation-duration: 13s;  animation-delay: 1s;   }
        .bubble:nth-child(6)  { width: 25px;  height: 25px;  left: 50%;  animation-duration: 7.5s; animation-delay: 2s;   }
        .bubble:nth-child(7)  { width: 50px;  height: 50px;  left: 60%;  animation-duration: 10s;  animation-delay: 0.8s; }
        .bubble:nth-child(8)  { width: 15px;  height: 15px;  left: 70%;  animation-duration: 6.5s; animation-delay: 2.5s; }
        .bubble:nth-child(9)  { width: 70px;  height: 70px;  left: 80%;  animation-duration: 12s;  animation-delay: 1.2s; }
        .bubble:nth-child(10) { width: 35px;  height: 35px;  left: 90%;  animation-duration: 8.5s; animation-delay: 0.3s; }
        .bubble:nth-child(11) { width: 22px;  height: 22px;  left: 8%;   animation-duration: 7s;   animation-delay: 4s;   }
        .bubble:nth-child(12) { width: 55px;  height: 55px;  left: 25%;  animation-duration: 11s;  animation-delay: 3.5s; }
        .bubble:nth-child(13) { width: 18px;  height: 18px;  left: 55%;  animation-duration: 6s;   animation-delay: 1.8s; }
        .bubble:nth-child(14) { width: 45px;  height: 45px;  left: 75%;  animation-duration: 9.5s; animation-delay: 2.8s; }
        .bubble:nth-child(15) { width: 28px;  height: 28px;  left: 95%;  animation-duration: 8s;   animation-delay: 0.6s; }
        .bubble:nth-child(16) { width: 16px;  height: 16px;  left: 35%;  animation-duration: 6.5s; animation-delay: 5s;   }
        .bubble:nth-child(17) { width: 38px;  height: 38px;  left: 65%;  animation-duration: 9s;   animation-delay: 4.5s; }
        .bubble:nth-child(18) { width: 24px;  height: 24px;  left: 48%;  animation-duration: 8s;   animation-delay: 3.2s; }

        @keyframes rise {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.7; }
            100% { transform: translateY(-110vh) translateX(25px); opacity: 0; }
        }

        /* ── Card ── */
        .page { position: relative; z-index: 10; width: 100%; max-width: 390px; }

        .card {
            background: #ffffff;
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 2.5rem 2.25rem 2rem;
            box-shadow: 0 8px 48px rgba(0,0,0,0.5);
        }

        .brand { text-align: center; margin-bottom: 2rem; }
        .crab-icon { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
        .brand-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.05rem;
            font-weight: 600;
            color: #1a2a3a;
        }
        .brand-sub { font-size: 0.76rem; color: #7a8aaa; margin-top: 0.2rem; font-weight: 300; }

        .err-msg {
            display: none;
            background: #fff0f0;
            border: 1px solid #f5c6c6;
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.8rem;
            color: #c0392b;
            margin-bottom: 1.1rem;
        }
        .err-msg.show { display: block; }

        .field { margin-bottom: 1rem; }
        .field-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 500;
            color: #4a5a70;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }
        .field-wrap { position: relative; }

        .field-input {
            width: 100%;
            padding: 0.72rem 2.5rem 0.72rem 0.95rem;
            background: rgba(100,150,220,0.08);
            border: 1.5px solid rgba(100,150,220,0.2);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            color: #1a2a3a;
            outline: none;
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }
        .field-input::placeholder { color: #b0bcd0; }
        .field-input:focus {
            border-color: #2e6fbc;
            background: rgba(46,111,188,0.07);
            box-shadow: 0 0 0 3px rgba(46,111,188,0.12);
        }
        .field-input.shake { animation: shake 0.35s ease; border-color: rgba(239,68,68,0.6); }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .eye-btn {
            position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #b0bcd0;
            font-size: 0.9rem; cursor: pointer; padding: 4px; transition: color 0.15s;
        }
        .eye-btn:hover { color: #4a5a70; }

        .signin-btn {
            width: 100%; padding: 0.82rem; margin-top: 0.4rem;
            background: linear-gradient(135deg, #1a6fd4, #0e4fa3);
            color: #fff; border: none; border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem; font-weight: 500;
            cursor: pointer;
            transition: opacity 0.18s, transform 0.15s, box-shadow 0.18s;
            box-shadow: 0 4px 18px rgba(26,111,212,0.4);
        }
        .signin-btn:hover { opacity: 0.9; box-shadow: 0 6px 24px rgba(26,111,212,0.55); }
        .signin-btn:active { transform: scale(0.99); }
        .signin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-spin {
            display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .card-foot {
            margin-top: 1.5rem;
            padding-top: 1.1rem;
            border-top: 1px solid rgba(100,150,220,0.15);
            font-size: 0.71rem;
            color: #9aabbd;
            line-height: 1.7;
            text-align: center;
        }

        /* Loading overlay */
        .load-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(6,15,30,0.82);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.85rem;
            opacity: 0; pointer-events: none; transition: opacity 0.25s;
        }
        .load-overlay.on { opacity: 1; pointer-events: all; }
        .load-ring {
            width: 44px; height: 44px;
            border: 3px solid rgba(100,160,255,0.2);
            border-top-color: #64a0ff;
            border-radius: 50%; animation: spin 0.85s linear infinite;
        }
        .load-text { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; font-weight: 600; color: #e8f0ff; }
        .load-dest { font-size: 0.74rem; color: rgba(180,200,255,0.45); }
    </style>
</head>
<body>

<div class="bg-grad"></div>

<div class="bubbles">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
</div>

<div class="load-overlay" id="loadOverlay">
    <div class="load-ring"></div>
    <div class="load-text" id="loadText">Signing in…</div>
    <div class="load-dest" id="loadDest"></div>
</div>

<div class="page">
    <div class="card">
        <div class="brand">
            <span class="crab-icon">🦀</span>
            <div class="brand-title">Crab Monitoring System</div>
            <div class="brand-sub">Ingore-Baldoza Fisherfolks Association</div>
        </div>

        <div class="err-msg" id="errMsg"></div>

        <div class="field">
            <label class="field-label">Username</label>
            <div class="field-wrap">
                <input class="field-input" id="username" type="text"
                    placeholder="Enter your username"
                    autocomplete="username" spellcheck="false"
                    onkeydown="if(event.key==='Enter')doSignIn()">
            </div>
        </div>

        <div class="field">
            <label class="field-label">Password</label>
            <div class="field-wrap">
                <input class="field-input" id="password" type="password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    onkeydown="if(event.key==='Enter')doSignIn()">
                <button class="eye-btn" type="button" onclick="toggleEye()" tabindex="-1" id="eyeBtn">👁</button>
            </div>
        </div>

        <button class="signin-btn" id="signinBtn" onclick="doSignIn()">Log In</button>

        <div class="card-foot">
            <p>🔒 Secured connection · Session expires in 24h</p>
            <p>Need an account? Contact your administrator.</p>
        </div>
    </div>
</div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCL2YkjBwcQR642R9l0AXuX5ayczH2q1EM",
        authDomain: "crabmonitoringsystem-ab2ea.firebaseapp.com",
        databaseURL: "https://crabmonitoringsystem-ab2ea-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "crabmonitoringsystem-ab2ea",
        storageBucket: "crabmonitoringsystem-ab2ea.firebasestorage.app",
        messagingSenderId: "910140962027",
        appId: "1:910140962027:web:ec86956350b4ec28567aae",
        measurementId: "G-EQ00V82X14"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const stored = sessionStorage.getItem('crabMonitoringSession')
                || localStorage.getItem('crabMonitoringSession');
    if (stored) {
        try {
            const d = JSON.parse(stored);
            const hrs = (Date.now() - new Date(d.loginTime)) / 3600000;
            if (hrs < 24) {
                if (!sessionStorage.getItem('crabMonitoringSession'))
                    sessionStorage.setItem('crabMonitoringSession', stored);
                window.location.replace(d.role === 'admin' ? 'admin.html' : 'dashboard.html');
            } else {
                sessionStorage.removeItem('crabMonitoringSession');
                localStorage.removeItem('crabMonitoringSession');
            }
        } catch {}
    }

    window.doSignIn = async () => {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        hideErr();

        if (!username || !password) { showErr('Please enter your username and password.'); shakeFields(); return; }

        const btn = document.getElementById('signinBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="btn-spin"></span>Signing in…';

        try {
            if (username.toLowerCase() === 'admin' && password === 'Admin123') {
                const session = { username: 'admin', name: 'Administrator', role: 'admin', loginTime: new Date().toISOString(), lastActive: Date.now() };
                sessionStorage.setItem('crabMonitoringSession', JSON.stringify(session));
                setLoading(true, 'Welcome, Admin!', '→ Redirecting to Admin Panel');
                setTimeout(() => { window.location.href = 'admin.html'; }, 900);
                return;
            }

            const snap = await get(ref(db, 'users'));
            if (!snap.exists()) { showErr('No accounts found. Contact your administrator.'); resetBtn(); return; }

            const users = snap.val();
            let matchedKey = null, matchedUser = null;
            for (const [key, u] of Object.entries(users)) {
                if ((u.username || '').toLowerCase() === username.toLowerCase() && u.password === password) {
                    matchedKey = key; matchedUser = u; break;
                }
            }

            if (!matchedUser) { showErr('Incorrect username or password. Please try again.'); shakeFields(); resetBtn(); return; }

            await set(ref(db, `users/${matchedKey}`), { ...matchedUser, lastLogin: Date.now(), lastActive: Date.now() });

            const fullName = [matchedUser.firstName || '', matchedUser.lastName || ''].join(' ').trim() || matchedUser.name || matchedUser.username;
            const role = matchedUser.role || 'monitor1';
            const session = { username: matchedUser.username, name: fullName, role, loginTime: new Date().toISOString(), lastActive: Date.now(), _fbKey: matchedKey };
            sessionStorage.setItem('crabMonitoringSession', JSON.stringify(session));

            const isAdmin = role === 'admin';
            setLoading(true, `Welcome, ${fullName.split(' ')[0]}!`, `→ Redirecting to ${isAdmin ? 'Admin Panel' : 'Dashboard'}`);
            setTimeout(() => { window.location.href = isAdmin ? 'admin.html' : 'dashboard.html'; }, 900);

        } catch (err) { showErr(`Connection error: ${err.message}`); resetBtn(); }
    };

    function resetBtn() {
        const btn = document.getElementById('signinBtn');
        btn.disabled = false; btn.innerHTML = 'Log In';
    }
</script>

<script>
    function toggleEye() {
        const inp = document.getElementById('password'), btn = document.getElementById('eyeBtn');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.textContent = inp.type === 'text' ? '🙈' : '👁';
    }
    function showErr(msg) { const el = document.getElementById('errMsg'); el.textContent = msg; el.className = 'err-msg show'; }
    function hideErr() { document.getElementById('errMsg').className = 'err-msg'; }
    function shakeFields() {
        ['username','password'].forEach(id => {
            const el = document.getElementById(id);
            el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
            el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
        });
    }
    function setLoading(on, text, dest) {
        if (text) document.getElementById('loadText').textContent = text;
        if (dest) document.getElementById('loadDest').textContent = dest;
        document.getElementById('loadOverlay').classList.toggle('on', on);
    }
</script>
</body>
</html>
